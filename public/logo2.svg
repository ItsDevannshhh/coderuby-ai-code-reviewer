<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" fill="none">
  <defs>
    <!-- Main gem gradient: deep orange to amber -->
    <linearGradient id="gemMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFD166"/>
      <stop offset="30%"  stop-color="#FF8C00"/>
      <stop offset="70%"  stop-color="#E85500"/>
      <stop offset="100%" stop-color="#B83500"/>
    </linearGradient>

    <!-- Top facet: bright catch-light -->
    <linearGradient id="gemTop" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#FFE8A0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FF9900" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Left facet: mid-tone -->
    <linearGradient id="gemLeft" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FF8000" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#AA3300" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Right facet: darker edge -->
    <linearGradient id="gemRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF6600" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#992200" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Bottom facet -->
    <linearGradient id="gemBottom" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#CC4400" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#881E00" stop-opacity="1"/>
    </linearGradient>

    <!-- Line / node gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FF7B00"/>
    </linearGradient>

    <!-- Bracket gradient -->
    <linearGradient id="bracketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>

    <!-- Outer glow for gem -->
    <filter id="glowSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow for nodes/lines -->
    <filter id="glowStrong" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow under gem -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#FF6600" flood-opacity="0.35"/>
    </filter>

    <!-- Sparkle glow -->
    <filter id="sparkleGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ──────────────────────────────────────────────
       GIT MERGE LINES (behind gem, glowing orange)
  ────────────────────────────────────────────────── -->

  <!-- Top branch line: from node → gem -->
  <path d="M 82 160 C 130 160 160 175 190 196"
        stroke="url(#lineGrad)" stroke-width="3.5" stroke-linecap="round"
        filter="url(#glowStrong)" opacity="0.9"/>

  <!-- Bottom branch line: from node → gem -->
  <path d="M 82 260 C 130 260 160 245 190 224"
        stroke="url(#lineGrad)" stroke-width="3.5" stroke-linecap="round"
        filter="url(#glowStrong)" opacity="0.9"/>

  <!-- Vertical connector between two commit nodes (git graph style) -->
  <path d="M 82 160 L 82 260"
        stroke="#FF8C00" stroke-width="2" stroke-dasharray="5 4"
        stroke-linecap="round" opacity="0.5"/>

  <!-- Merged output line: gem → right node -->
  <path d="M 330 210 C 360 210 400 210 438 210"
        stroke="url(#lineGrad)" stroke-width="3.5" stroke-linecap="round"
        filter="url(#glowStrong)" opacity="0.9"/>

  <!-- ──────────────────────────────────────────────
       GIT COMMIT NODES (circles)
  ────────────────────────────────────────────────── -->

  <!-- Top branch commit node -->
  <circle cx="82" cy="160" r="11" fill="#FF8C00" filter="url(#glowStrong)"/>
  <circle cx="82" cy="160" r="7"  fill="#FFD166"/>
  <circle cx="82" cy="160" r="3"  fill="white" fill-opacity="0.8"/>

  <!-- Bottom branch commit node -->
  <circle cx="82" cy="260" r="11" fill="#FF8C00" filter="url(#glowStrong)"/>
  <circle cx="82" cy="260" r="7"  fill="#FFD166"/>
  <circle cx="82" cy="260" r="3"  fill="white" fill-opacity="0.8"/>

  <!-- Merged result commit node -->
  <circle cx="438" cy="210" r="13" fill="#FF7B00" filter="url(#glowStrong)"/>
  <circle cx="438" cy="210" r="8"  fill="#FFD166"/>
  <circle cx="438" cy="210" r="3"  fill="white" fill-opacity="0.85"/>

  <!-- ──────────────────────────────────────────────
       CODE BRACKETS  < >
  ────────────────────────────────────────────────── -->

  <!-- Left bracket  < -->
  <path d="M 46 210 L 20 188 L 46 166"
        stroke="url(#bracketGrad)" stroke-width="6" stroke-linecap="round"
        stroke-linejoin="round" filter="url(#glowStrong)"/>
  <!-- second inner stroke for depth -->
  <path d="M 46 210 L 20 188 L 46 166"
        stroke="#FFE8A0" stroke-width="1.5" stroke-linecap="round"
        stroke-linejoin="round" opacity="0.5"/>

  <!-- Right bracket  > -->
  <path d="M 474 166 L 500 188 L 474 210"
        stroke="url(#bracketGrad)" stroke-width="6" stroke-linecap="round"
        stroke-linejoin="round" filter="url(#glowStrong)"/>
  <path d="M 474 166 L 500 188 L 474 210"
        stroke="#FFE8A0" stroke-width="1.5" stroke-linecap="round"
        stroke-linejoin="round" opacity="0.5"/>

  <!-- ──────────────────────────────────────────────
       RUBY GEM  (hexagonal with multi-face facets)
       Center: 260, 207   Width≈140  Height≈170
  ────────────────────────────────────────────────── -->

  <!-- Gem outer shadow/glow -->
  <polygon points="260,100 325,140 340,210 305,283 215,283 180,210 195,140"
           fill="#FF6600" filter="url(#shadow)" opacity="0.5"/>

  <!-- ── Base gem body ── -->
  <polygon points="260,100 325,140 340,210 305,283 215,283 180,210 195,140"
           fill="url(#gemMain)" filter="url(#glowSoft)"/>

  <!-- ── Top crown facet (brightest) ── -->
  <!-- Crown edge: top-vertex to shoulder line -->
  <polygon points="260,100 325,140 260,168 195,140"
           fill="url(#gemTop)" opacity="0.9"/>

  <!-- ── Upper-left facet ── -->
  <polygon points="195,140 260,168 180,210"
           fill="url(#gemLeft)" opacity="0.85"/>

  <!-- ── Upper-right facet ── -->
  <polygon points="325,140 340,210 260,168"
           fill="url(#gemRight)" opacity="0.85"/>

  <!-- ── Lower-left facet ── -->
  <polygon points="180,210 260,168 215,283"
           fill="#C04000" fill-opacity="0.7"/>

  <!-- ── Lower-right facet ── -->
  <polygon points="340,210 305,283 260,168"
           fill="#8B2200" fill-opacity="0.75"/>

  <!-- ── Bottom tip ── -->
  <polygon points="215,283 260,168 305,283"
           fill="url(#gemBottom)" opacity="0.9"/>

  <!-- ── Internal girdle ring (creates faceted edge illusion) ── -->
  <polygon points="260,100 325,140 340,210 305,283 215,283 180,210 195,140"
           fill="none"
           stroke="#FFD166" stroke-width="1" stroke-opacity="0.3"/>

  <!-- ── Crown bevel lines (decorative edge details) ── -->
  <line x1="260" y1="100" x2="260" y2="168" stroke="#FFE8A0" stroke-width="1.5" stroke-opacity="0.25"/>
  <line x1="260" y1="168" x2="180" y2="210" stroke="#FFB347" stroke-width="1"   stroke-opacity="0.20"/>
  <line x1="260" y1="168" x2="340" y2="210" stroke="#FFB347" stroke-width="1"   stroke-opacity="0.20"/>
  <line x1="260" y1="168" x2="215" y2="283" stroke="#FF8C00" stroke-width="1"   stroke-opacity="0.20"/>
  <line x1="260" y1="168" x2="305" y2="283" stroke="#FF8C00" stroke-width="1"   stroke-opacity="0.20"/>

  <!-- ── Catch-light shine (top-left glow on gem) ── -->
  <ellipse cx="230" cy="133" rx="24" ry="12"
           fill="white" fill-opacity="0.22"
           transform="rotate(-30 230 133)"/>

  <!-- ── Secondary smaller shine ── -->
  <ellipse cx="250" cy="120" rx="10" ry="5"
           fill="white" fill-opacity="0.35"
           transform="rotate(-20 250 120)"/>

  <!-- ── Edge highlight on left face ── -->
  <line x1="195" y1="140" x2="180" y2="210"
        stroke="#FFE8A0" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>

  <!-- ── Outline stroke for crispness ── -->
  <polygon points="260,100 325,140 340,210 305,283 215,283 180,210 195,140"
           fill="none"
           stroke="#FF9900" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- ──────────────────────────────────────────────
       SPARKLE ACCENTS
  ────────────────────────────────────────────────── -->

  <!-- Top-left sparkle -->
  <g filter="url(#sparkleGlow)" transform="translate(148, 88)">
    <line x1="0" y1="-9" x2="0" y2="9"   stroke="#FFD166" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0"   stroke="#FFD166" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="6" y2="6"  stroke="#FFD166" stroke-width="1"   stroke-linecap="round" opacity="0.6"/>
    <line x1="6" y1="-6"  x2="-6" y2="6" stroke="#FFD166" stroke-width="1"   stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Top-right sparkle (smaller) -->
  <g filter="url(#sparkleGlow)" transform="translate(378, 74)">
    <line x1="0" y1="-6" x2="0" y2="6"   stroke="#FFBB44" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0"   stroke="#FFBB44" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="-4" x2="4" y2="4"  stroke="#FFBB44" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
    <line x1="4"  y1="-4" x2="-4" y2="4" stroke="#FFBB44" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Bottom-left sparkle (tiny) -->
  <g filter="url(#sparkleGlow)" transform="translate(120, 308)">
    <line x1="0" y1="-5" x2="0" y2="5"   stroke="#FF9900" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0"   stroke="#FF9900" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Bottom-right sparkle -->
  <g filter="url(#sparkleGlow)" transform="translate(398, 300)">
    <line x1="0" y1="-7" x2="0" y2="7"   stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0"   stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="-4" x2="4" y2="4"  stroke="#FF8C00" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
    <line x1="4"  y1="-4" x2="-4" y2="4" stroke="#FF8C00" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Tiny floating dots for depth -->
  <circle cx="110" cy="105" r="2.5" fill="#FFB347" opacity="0.7" filter="url(#sparkleGlow)"/>
  <circle cx="160" cy="320" r="2"   fill="#FF8C00" opacity="0.6" filter="url(#sparkleGlow)"/>
  <circle cx="360" cy="310" r="2.5" fill="#FFB347" opacity="0.65" filter="url(#sparkleGlow)"/>
  <circle cx="420" cy="120" r="2"   fill="#FFCC66" opacity="0.7" filter="url(#sparkleGlow)"/>
  <circle cx="80"  cy="210" r="1.8" fill="#FFD166" opacity="0.5"/>
  <circle cx="440" cy="160" r="1.8" fill="#FFD166" opacity="0.5"/>

</svg>
